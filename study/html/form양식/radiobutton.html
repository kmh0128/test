<!DOCTYPE html>

<head>

    <title>라디오 버튼</title>
</head>
<body>
    
    <form>
        <p>게임</p>

        <label for="명조">명조</label>
        <input type="radio" id="명조" name="game"><!---->

        <input type="submit" value="submit">
    </form>
